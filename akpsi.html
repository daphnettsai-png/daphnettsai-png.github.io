<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AKPsi Social Media Work</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fbfaf7;
      margin: 0;
      color: #1f2933;
    }

    .container {
      width: min(1100px, 90%);
      margin: 0 auto;
      padding: 4rem 0;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      color: #52606d;
      margin-bottom: 2rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .gallery img {
      width: 100%;
      border-radius: 16px;
    }

    video {
      width: 100%;
      border-radius: 16px;
    }

    .button {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.8rem 1.2rem;
      border-radius: 999px;
      border: 1px solid black;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>AKPsi Social Media Work</h1>

    <p>
      Created short-form content, graphics, and videos for AKPsi’s Instagram.
      Focused on engagement, branding, and storytelling.
    </p>

    <div class="gallery">
      <!-- Replace with your actual files -->
      <img src="post1.jpg">
      <img src="post2.jpg">
      <img src="post3.jpg">

      <video controls>
        <source src="video1.mp4" type="video/mp4">
      </video>

      <video controls>
        <source src="video2.mp4" type="video/mp4">
      </video>
    </div>

    <a class="button" href="index.html">Back to Portfolio</a>
  </div>
</body>
</html>
